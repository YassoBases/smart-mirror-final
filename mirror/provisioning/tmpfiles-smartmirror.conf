# Installed to /etc/tmpfiles.d/smartmirror.conf by provisioning/install.sh
# (which substitutes __USER__ with the backend's run-user).
#
# The non-root backend drops a "Change WiFi" request sentinel in this directory;
# a root systemd .path unit watches it. /run is a tmpfs, so this recreates the
# directory (owned by the backend user, not world-writable) on every boot.
d /run/smartmirror 0755 __USER__ __USER__ -
