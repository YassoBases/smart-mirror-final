name: smart_mirror_app
description: Smart Mirror mobile app for managing household profiles.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  http_parser: ^4.0.2
  mime: ^1.0.0
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  url_launcher: ^6.3.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  camera: ^0.12.0+1
  image_picker: ^1.1.2
  google_mlkit_face_detection: ^0.13.0
  path_provider: ^2.1.5
  mobile_scanner: ^5.2.3
  app_links: ^6.0.0
  connectivity_plus: ^6.1.0
  flutter_blue_plus: ^1.32.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
